<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <title>Ace Daemon - Offline</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial;
        background: radial-gradient(circle at 20% 20%, #111827 0%, #000000 60%);
        color: #f5f5f5;
      }
      main {
        width: min(90vw, 520px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 16px;
        padding: 24px;
        background: rgba(0, 0, 0, 0.45);
        backdrop-filter: blur(8px);
      }
      h1 {
        margin: 0 0 12px;
        font-size: 1.6rem;
      }
      p {
        margin: 0;
        line-height: 1.5;
        color: rgba(245, 245, 245, 0.8);
      }
      a {
        color: #7dd3fc;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Ace is offline</h1>
      <p>
        You can still open previously cached screens. Reconnect to refresh market feeds and sync swarm actions.
      </p>
    </main>
  </body>
</html>
